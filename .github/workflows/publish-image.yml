name: Publish image to ghcr.io

on:
  push:
    branches: [master]
    tags: ['v*.*.*']

concurrency:
  group: publish-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate --schema=prisma/schema.prisma
      - run: npm test

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - id: version
        run: echo "version=$(node -pe "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      # Next.js static export pre-renders pages that query the DB (e.g.
      # /characters). The seed isn't in the repo — pull it from Hugging
      # Face so `npm run build` has data to render against. Cached so
      # most runs don't re-download the 71 MB archive.
      - name: Cache seed download
        id: cache-seed
        uses: actions/cache@v4
        with:
          path: data/selah-seed.db.xz
          key: selah-seed-v1
      - name: Download seed
        if: steps.cache-seed.outputs.cache-hit != 'true'
        run: |
          mkdir -p data
          curl -L -o data/selah-seed.db.xz \
            https://huggingface.co/datasets/foooobear/selah-db/resolve/main/selah-seed.db.xz
      - name: Decompress seed
        run: |
          cp data/selah-seed.db.xz data/selah.db.xz
          xz -d -f data/selah.db.xz
          ls -lh data/selah.db

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tag strategy:
      #   master push → :dev, :sha-<short>
      #   v1.2.3 tag  → :1.2.3, :1.2, :1, :latest, :sha-<short>
      # The package.json version must match the git tag, otherwise we
      # refuse to publish (guards against forgetting to bump version).
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/selah-app
          tags: |
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/master' }}
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !startsWith(steps.version.outputs.version, '0.') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION="${{ steps.version.outputs.version }}"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::git tag v$TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
